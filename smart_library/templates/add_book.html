{% extends "base.html" %}

{% block title %}Add New Book{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-4 text-center">📘 Add New Book</h1>

    {% if message %}
        <div class="alert alert-info alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    {% endif %}

    <form method="POST" class="w-50 mx-auto">
        <div class="mb-3">
            <label class="form-label">Book Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Author</label>
            <input type="text" name="author" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Rack Location</label>
            <input type="text" name="rack_location" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Available Copies</label>
            <input type="number" name="available_copies" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Add Book</button>
        <a href="/" class="btn btn-secondary ms-2">Back to Search</a>
    </form>
</div>
{% endblock %}
