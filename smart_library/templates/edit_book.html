{% extends "base.html" %}

{% block title %}Edit Book{% endblock %}

{% block content %}
<h2 class="text-center mb-4">✏️ Edit Book</h2>

<form method="POST" class="w-50 mx-auto">
    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" value="{{ book.title }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Author</label>
        <input type="text" name="author" class="form-control" value="{{ book.author }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Rack Location</label>
        <input type="text" name="rack_location" class="form-control" value="{{ book.rack_location }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Available Copies</label>
        <input type="number" name="available_copies" class="form-control" value="{{ book.available_copies }}" required>
    </div>

    <button type="submit" class="btn btn-success">Update Book</button>
    <a href="/" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
