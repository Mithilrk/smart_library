<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Smart Library{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body.dark-mode {
      background-color: #121212;
      color: #e0e0e0;
    }

    .dark-mode .card {
      background-color:rgb(33, 31, 31);
      color: white;
    }

    .dark-mode .btn {
      background-color: #333;
      color: white;
    }
  </style>
</head>
<body class="{% if dark_mode %}dark-mode{% endif %}">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">📚 Smart Library</a>
    <div class="ms-auto">
      <button id="themeToggle" class="btn btn-sm btn-secondary">🌓 Toggle Dark Mode</button>
      {% if session.get('admin') %}
        <a href="/logout" class="btn btn-sm btn-danger ms-2">Logout</a>
      {% else %}
        <a href="/login" class="btn btn-sm btn-success ms-2">Login</a>
      {% endif %}
    </div>
  </nav>

  <!-- Toast Flash Message -->
  <div aria-live="polite" aria-atomic="true" class="position-fixed top-0 end-0 p-3" style="z-index: 1050">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
      <div class="toast" id="flashToast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="3000" data-bs-autohide="true">
          <div class="toast-header bg-primary text-white">
            <strong class="me-auto">Notification</strong>
            <small>Just now</small>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
          </div>
          <div class="toast-body">
            {{ messages[0] }}
          </div>
        </div>
      {% endif %}
    {% endwith %}
  </div>

  <!-- Page Content -->
  <div class="container mt-4">
    {% block content %}{% endblock %}
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-mode');
    }

    document.getElementById('themeToggle').addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const theme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
      localStorage.setItem('theme', theme);
    });
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const toastEl = document.getElementById('flashToast');
      if (toastEl) {
        const toast = new bootstrap.Toast(toastEl);
        toast.show();
      }
    });
  </script>
  
</body>
</html>
